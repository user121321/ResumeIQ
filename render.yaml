services:
  - type: web
    name: resume-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: 2048
      - key: MAX_PDF_SIZE_MB
        value: 10
